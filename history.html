<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bill History - Plywood Inventory</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="history">
    <header class="topbar">
      <h1>Plywood Shop System</h1>
      <nav class="nav-links">
        <a href="./inventory.html">Inventory</a>
        <a href="./billing.html">Billing</a>
        <a class="active" href="./history.html">History</a>
      </nav>
    </header>

    <main class="page">
      <section class="panel">
        <div class="toolbar" style="justify-content: space-between;">
          <h2>Bill History</h2>
          <select id="historyFilter" style="width: auto; padding: 0.5rem; font-size: 1rem; border-radius: 8px; border: 1px solid #ddd;">
            <option value="today">Today</option>
            <option value="all">All Time</option>
          </select>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date & Time</th>
                <th>Total Items</th>
                <th>Grand Total</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="historyTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
