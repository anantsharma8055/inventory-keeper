<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plywood Inventory</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="inventory">
    <header class="topbar">
      <h1>Plywood Shop System</h1>
      <nav class="nav-links">
        <a class="active" href="./inventory.html">Inventory</a>
        <a href="./billing.html">Billing</a>
        <a href="./history.html">History</a>
      </nav>
    </header>

    <main class="page">
      <section class="panel">
        <div class="toolbar">
          <input
            id="inventorySearch"
            type="text"
            placeholder="Search by name, category, brand, size..."
          />
          <button id="openProductModalBtn" class="btn btn-primary">Add Product</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Brand</th>
                <th>Thickness</th>
                <th>Dimensions (L×B)</th>
                <th>Buy Price</th>
                <th>Default Rate</th>
                <th>Qty</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="inventoryTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <div id="productModal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-head">
          <h2 id="productModalTitle">Add Product</h2>
          <button id="closeProductModalBtn" class="btn btn-light">X</button>
        </div>
        <form id="productForm" class="form-grid">
          <input type="hidden" id="productId" />

          <label>
            Name
            <input id="name" type="text" required />
          </label>
          <label>
            Category
            <input id="category" type="text" required />
          </label>
          <label>
            Brand
            <input id="brand" type="text" required />
          </label>
          <label>
            Thickness
            <input id="thickness" type="text" />
          </label>
          <label>
            Pricing Type
            <select id="pricingType">
              <option value="area">Area (sq ft)</option>
              <option value="unit">Unit (fixed piece)</option>
            </select>
          </label>
          <label>
            Length (ft)
            <input id="length" type="number" min="0" step="0.01" />
          </label>
          <label>
            Breadth (ft)
            <input id="breadth" type="number" min="0" step="0.01" />
          </label>
          <label>
            Purchase Price
            <input id="purchasePrice" type="number" min="0" step="0.01" required />
          </label>
          <label>
            Selling Price (Default Rate)
            <input id="sellingPrice" type="number" min="0" step="0.01" required />
          </label>
          <label>
            Quantity
            <input id="quantity" type="number" min="0" step="1" required />
          </label>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="saveProductBtn">Save Product</button>
          </div>
        </form>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
