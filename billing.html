<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plywood Billing</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="billing">
    <header class="topbar">
      <h1>Plywood Shop System</h1>
      <nav class="nav-links">
        <a href="./inventory.html">Inventory</a>
        <a class="active" href="./billing.html">Billing</a>
        <a href="./history.html">History</a>
      </nav>
    </header>

    <main class="page">
      <section class="billing-grid">
        <div class="panel">
          <h2>Products</h2>
          <input id="billingSearch" type="text" placeholder="Search products..." />
          <div id="billingProductList" class="product-list"></div>
        </div>

        <div class="panel">
          <h2>Cart</h2>
          <div id="cartItems" class="cart-items"></div>

          <div class="gst-row">
            <label>
              <input id="gstToggle" type="checkbox" />
              Add GST (18%)
            </label>
          </div>

          <div class="delivery-row">
            <label>Delivery Fee</label>
            <input type="number" id="deliveryFee" value="0" min="0" />
          </div>

          <div class="total-box">
            <p>Total</p>
            <h3 id="totalPrice">Rs. 0.00</h3>
          </div>

          <button id="generateBillBtn" class="btn btn-primary full-width">Generate Bill</button>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
